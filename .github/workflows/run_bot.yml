name: AI Stock Bot Daily Run

on:
  schedule:
    - cron: '55 0 * * 1-5'  # 台灣時間每週一至週五早上 08:55 自動雲端開機
  workflow_dispatch:        # 允許你用手機打開網頁，手動點按鈕強制開機測試

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
    - name: 1. 複製專案檔案到雲端
      uses: actions/checkout@v3

    - name: 2. 初始化 Python 環境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 3. 安裝必備量化套件
      run: |
        pip install requests pandas

    - name: 4. 執行 AI 輪動大腦並更新 JSON
      run: python main.py

    - name: 5. 自動將更新後的 market_state.json 存回 GitHub
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add market_state.json
        git commit -m "盤中即時數據同步" || exit 0
        git push
